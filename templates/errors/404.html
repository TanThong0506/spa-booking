<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không tìm thấy trang - Spa Booking</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, #fff1f5, #ffffff);
            color: #2b2225;
            font-family: Arial, Helvetica, sans-serif;
        }
        .error-card {
            width: min(620px, 100%);
            padding: 42px 30px;
            border: 1px solid rgba(199, 91, 122, 0.2);
            border-radius: 28px;
            background: white;
            text-align: center;
            box-shadow: 0 20px 60px rgba(199, 91, 122, 0.16);
        }
        .error-code {
            margin: 0;
            color: #c75b7a;
            font-size: 72px;
            font-weight: 900;
        }
        h1 { margin: 8px 0 14px; }
        p { color: #746d70; line-height: 1.7; }
        a {
            min-height: 48px;
            margin-top: 16px;
            padding: 0 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #c75b7a;
            color: white;
            text-decoration: none;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <main class="error-card">
        <div class="error-code">404</div>
        <h1>{{ custom_title|default:"Không tìm thấy trang" }}</h1>
        <p>
            {{ custom_message|default:"Đường dẫn bạn truy cập không tồn tại hoặc đã được thay đổi." }}
        </p>
        <a href="{% url 'home' %}">Về trang chủ</a>
    </main>
</body>
</html>
