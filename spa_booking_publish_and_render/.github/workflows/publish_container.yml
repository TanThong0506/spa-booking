name: Publish Docker Package

on:
  workflow_run:
    workflows:
      - Spa Booking CI
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    name: Publish Image To GHCR
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/tanthong0506/spa-booking
      IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" |
          docker login ghcr.io             --username "${{ github.actor }}"             --password-stdin

      - name: Build Docker image
        run: |
          docker build             --label "org.opencontainers.image.source=https://github.com/TanThong0506/spa-booking"             --label "org.opencontainers.image.revision=${IMAGE_SHA}"             --tag "${IMAGE_NAME}:latest"             --tag "${IMAGE_NAME}:sha-${IMAGE_SHA}"             .

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:sha-${IMAGE_SHA}"

      - name: Show published image
        run: |
          echo "Published:"
          echo "${IMAGE_NAME}:latest"
          echo "${IMAGE_NAME}:sha-${IMAGE_SHA}"
