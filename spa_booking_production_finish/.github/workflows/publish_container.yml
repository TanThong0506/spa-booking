name: Publish Docker Package

on:
  workflow_run:
    workflows:
      - Spa Booking CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    name: Publish Image To GHCR
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/tanthong0506/spa-booking

    steps:
      - name: Resolve commit SHA
        id: source
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.sha }}

      - name: Log in to GitHub Container Registry
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Build Docker image
        shell: bash
        run: |
          docker build \
            --label "org.opencontainers.image.source=https://github.com/TanThong0506/spa-booking" \
            --label "org.opencontainers.image.revision=${{ steps.source.outputs.sha }}" \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:sha-${{ steps.source.outputs.sha }}" \
            .

      - name: Push Docker image
        shell: bash
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:sha-${{ steps.source.outputs.sha }}"

      - name: Published image summary
        shell: bash
        run: |
          {
            echo "## Docker image published"
            echo
            echo "\`${IMAGE_NAME}:latest\`"
            echo
            echo "\`${IMAGE_NAME}:sha-${{ steps.source.outputs.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
